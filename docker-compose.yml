# Local stack: PostgreSQL, MinIO (object storage), UMS API.
#
# Setup: root .env is committed with local dev defaults; see .env.example as the template to reset.
#
# First run (apply EF migrations from the repo root, with Postgres reachable):
#   docker compose up -d postgres
#   dotnet ef database update \
#     --project src/UMS.Infrastructure/UMS.Infrastructure.csproj \
#     --startup-project src/UMS.api/UMS.api.csproj \
#     --connection "Host=localhost;Port=5432;Database=Usher_mgmt;Username=postgres;Password=postgres"
#
# Then:
#   docker compose up --build
#
# API: http://localhost:8080  |  MinIO console: http://localhost:9001 (minioadmin / minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Usher_mgmt
    ports:
      - "5432:5432"
    volumes:
      - ums_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Usher_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ums_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb local/ums-files --ignore-existing"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

volumes:
  ums_postgres_data:
  ums_minio_data:
