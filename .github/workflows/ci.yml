name: CI

on:
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore UMS.sln

      - name: Check formatting
        run: dotnet format UMS.sln --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build UMS.sln --no-restore

      - name: Test
        run: dotnet test UMS.sln --no-build --verbosity normal
