name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Docker metadata (tags)
        id: meta
        run: |
          REGISTRY="${{ secrets.AZURE_ACR_LOGIN_SERVER }}"
          REPO="${{ secrets.AZURE_ACR_REPOSITORY }}"
          SHA_TAG="${REGISTRY}/${REPO}:${GITHUB_SHA}"
          LATEST_TAG="${REGISTRY}/${REPO}:latest"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "image_ref=${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VM (Docker Compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_SSH_HOST }}
          username: ${{ secrets.AZURE_VM_SSH_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            COMPOSE_DIR="${{ secrets.AZURE_VM_COMPOSE_DIR }}"
            if [ -z "${COMPOSE_DIR}" ] || [ ! -d "${COMPOSE_DIR}" ]; then
              echo "AZURE_VM_COMPOSE_DIR must be set to an existing directory on the VM (where docker-compose.yml lives)."
              exit 1
            fi
            cd "${COMPOSE_DIR}"

            echo "${{ secrets.AZURE_ACR_PASSWORD }}" | docker login "${{ secrets.AZURE_ACR_LOGIN_SERVER }}" \
              -u "${{ secrets.AZURE_ACR_USERNAME }}" --password-stdin

            # Optional in compose: image: ...:${IMAGE_TAG:-latest}  (CI pushes both :$SHA and :latest)
            export IMAGE_TAG="${{ github.sha }}"

            docker compose down
            docker compose pull
            docker compose up -d --remove-orphans

            docker image prune -f
